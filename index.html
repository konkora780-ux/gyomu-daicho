<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おしごと帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #22262f;
    --ink-soft: #4a5160;
    --ink-faint: #8b93a3;
    --washi: #f7f4ec;
    --washi-deep: #efe9dc;
    --line: #e2dccf;
    --indigo: #3d5a80;
    --indigo-deep: #2b3d56;
    --shu: #d1495b;
    --take: #588b76;
    --yamabuki: #e0a458;
    --paper-shadow: 0 1px 2px rgba(34,38,47,0.04), 0 8px 24px rgba(34,38,47,0.06);
  }

  * { box-sizing: border-box; }

  body {
    font-family: "Zen Kaku Gothic New", -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #33405a 0%, transparent 60%),
      linear-gradient(160deg, #262b38 0%, #1f2530 100%);
    background-attachment: fixed;
    margin: 0;
    padding: 40px 16px 64px;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .notebook {
    max-width: 660px;
    margin: 0 auto;
    background: var(--washi);
    background-image:
      radial-gradient(circle at 30% 20%, rgba(61,90,128,0.03) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(88,139,118,0.03) 0%, transparent 40%);
    border-radius: 14px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.28), 0 2px 0 rgba(255,255,255,0.5) inset;
    padding: 40px 28px 32px;
    position: relative;
  }

  /* 署名要素：上部から垂れる朱の栞リボン */
  .notebook::before {
    content: "";
    position: absolute;
    top: -8px;
    right: 40px;
    width: 26px;
    height: 68px;
    background: linear-gradient(180deg, var(--shu) 0%, #b23a4b 100%);
    border-radius: 3px 3px 0 0;
    box-shadow: 0 4px 10px rgba(178,58,75,0.35);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 82%, 0 100%);
  }

  .wrap { max-width: 660px; margin: 0 auto; }

  /* ヘッダー */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-family: "Zen Old Mincho", serif;
    font-weight: 900;
    font-size: 27px;
    letter-spacing: 0.08em;
    margin: 0;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  header h1 .eyebrow {
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--indigo);
    text-transform: uppercase;
  }
  #loginArea button {
    padding: 9px 16px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    border: none;
    border-radius: 999px;
    background: var(--indigo);
    color: #fff;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  #loginArea button:hover { background: var(--indigo-deep); }
  #loginArea button:active { transform: scale(0.97); }
  #loginArea button:disabled { background: #c3bdb0; }
  #loginArea .ok {
    font-size: 12px;
    color: var(--take);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  #reloginBtn {
    padding: 5px 11px !important;
    font-size: 11px !important;
    border: 1px solid var(--line) !important;
    border-radius: 999px !important;
    background: #fff !important;
    color: var(--indigo) !important;
    cursor: pointer;
  }

  /* 追加フォーム */
  .add-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--paper-shadow);
    padding: 20px;
    margin-bottom: 24px;
  }
  .add-card .row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .add-card input[type=text], .add-card input[type=date], .add-card select {
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    background: var(--washi);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .add-card input:focus, .add-card select:focus {
    outline: none;
    border-color: var(--indigo);
    box-shadow: 0 0 0 3px rgba(61,90,128,0.12);
    background: #fff;
  }
  #titleInput { flex: 1 1 100%; font-size: 15px; }
  .field-label { font-size: 12px; color: var(--ink-faint); display: block; margin-bottom: 2px; }
  .field-group { display: flex; flex-direction: column; }
  #dueInput { flex: 1 1 170px; min-width: 170px; }
  #prioritySelect, #categoryInput, #recurSelect { flex: 1 1 110px; min-width: 110px; }
  .add-card button#addBtn {
    margin-top: 6px;
    padding: 13px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: var(--ink);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .add-card button#addBtn:hover { background: #000; }
  .add-card button#addBtn:active { transform: scale(0.99); }

  /* タスク一覧 */
  .task {
    position: relative;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--paper-shadow);
    margin-bottom: 11px;
    padding: 14px 16px 14px 22px;
    display: flex;
    align-items: center;
    gap: 12px;
    overflow: hidden;
    transition: transform 0.12s, box-shadow 0.2s;
  }
  .task:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(34,38,47,0.1); }
  .task::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
  }
  .task.p-高::before { background: var(--shu); }
  .task.p-中::before { background: var(--yamabuki); }
  .task.p-低::before { background: var(--take); }

  .task.done { opacity: 0.5; }
  .task .stamp {
    position: absolute;
    right: 12px;
    top: 10px;
    border: 2px solid var(--shu);
    color: var(--shu);
    font-family: "Zen Old Mincho", serif;
    font-size: 11px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 4px;
    transform: rotate(-11deg);
    letter-spacing: 2px;
  }

  .task .check {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: var(--take);
  }
  .task .info { flex: 1; min-width: 0; }
  .task .title { font-size: 15px; font-weight: 700; word-break: break-word; color: var(--ink); }
  .task .title.done-text { text-decoration: line-through; color: var(--ink-faint); }
  .task .meta { font-size: 12px; color: var(--ink-faint); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .task .meta .tag {
    background: var(--washi-deep);
    border-radius: 6px;
    padding: 2px 8px;
    color: var(--ink-soft);
  }
  .task .delBtn {
    flex-shrink: 0;
    border: none;
    background: none;
    color: #c8c2b5;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .task .delBtn:hover { color: var(--shu); background: rgba(209,73,91,0.08); }

  .empty { text-align: center; color: var(--ink-faint); font-size: 14px; padding: 44px 0; }
  .status { font-size: 13px; color: var(--indigo); margin: 8px 0; min-height: 18px; font-weight: 500; }

  /* 表示切り替えタブ */
  .viewTabs {
    display: flex;
    gap: 4px;
    margin-bottom: 22px;
    background: var(--washi-deep);
    padding: 4px;
    border-radius: 12px;
  }
  .viewTabs button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--ink-faint);
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .viewTabs button.active {
    background: #fff;
    color: var(--ink);
    box-shadow: 0 1px 4px rgba(34,38,47,0.1);
  }

  /* カレンダー表示 */
  .calNav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .calNav button {
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: var(--ink-soft);
    transition: background 0.2s;
  }
  .calNav button:hover { background: var(--washi-deep); }
  .calNav .calTitle {
    font-family: "Zen Old Mincho", serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .calGrid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .calDow {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-faint);
    padding: 6px 0;
  }
  .calDow.sun { color: var(--shu); }
  .calDow.sat { color: var(--indigo); }
  .calCell {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 9px;
    min-height: 88px;
    padding: 5px;
    font-size: 11px;
    cursor: pointer;
    overflow: hidden;
    transition: box-shadow 0.15s, transform 0.1s;
  }
  .calCell:not(.empty):hover { box-shadow: 0 2px 10px rgba(34,38,47,0.1); transform: translateY(-1px); }
  .calCell.empty { background: transparent; border-color: transparent; cursor: default; }
  .calCell.today { border-color: var(--indigo); border-width: 2px; background: rgba(61,90,128,0.04); }
  .calCell.selected { border-color: var(--shu); box-shadow: 0 0 0 2px rgba(209,73,91,0.15); }
  .calCell .dNum { font-weight: 700; color: var(--ink-soft); margin-bottom: 3px; }
  .calCell .evChip {
    background: rgba(61,90,128,0.12);
    color: var(--indigo-deep);
    border-radius: 4px;
    padding: 1px 4px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }
  .calCell .evChip.task {
    background: rgba(88,139,118,0.15);
    color: #3a5f4f;
  }
  .calLegend {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--ink-faint);
    margin: 4px 2px 14px;
  }
  .calLegend span { display: flex; align-items: center; gap: 5px; }
  .calLegend .dot {
    width: 9px; height: 9px; border-radius: 3px; display: inline-block;
  }
  .calLegend .dot.task { background: var(--take); }
  .calLegend .dot.event { background: var(--indigo); }
  .calExternalLinks {
    display: flex;
    gap: 8px;
    margin: 0 2px 14px;
    flex-wrap: wrap;
  }
  .calExternalLinks a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--indigo);
    text-decoration: none;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .calExternalLinks a:hover {
    background: var(--washi-deep);
    box-shadow: 0 2px 8px rgba(34,38,47,0.08);
  }
  .calCell .evMore { color: var(--ink-faint); font-size: 10px; }
  .dayDetail {
    margin-top: 14px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--paper-shadow);
    padding: 16px 18px;
  }
  .dayDetail .dTitle {
    font-family: "Zen Old Mincho", serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--ink);
  }
  .dayDetail .evRow {
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    color: var(--ink-soft);
  }
  .dayDetail .evRow:last-child { border-bottom: none; }
  .dayDetail .evRow .dot {
    width: 8px; height: 8px; border-radius: 2px; display: inline-block; flex-shrink: 0;
  }
  .dayDetail .evRow .dot.task { background: var(--take); }
  .dayDetail .evRow .dot.event { background: var(--indigo); }
  .dayDetail .evTime { color: var(--ink-faint); font-size: 12px; margin-right: 6px; }
  .dayDetail .evEmpty { color: var(--ink-faint); font-size: 13px; }
  .dayDetail .evCal {
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--washi-deep);
    border-radius: 5px;
    padding: 1px 6px;
    margin-left: 6px;
  }

  #syncBtn {
    border: none;
    background: none;
    color: var(--indigo);
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  #syncBtn:hover { background: rgba(61,90,128,0.08); }

  /* リンク集 */
  #addLinkBtn {
    margin-top: 6px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: var(--indigo);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  #addLinkBtn:hover { background: var(--indigo-deep); }
  #addLinkBtn:active { transform: scale(0.99); }
  .linkItem {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--paper-shadow);
    padding: 14px 16px;
    margin-bottom: 11px;
    text-decoration: none;
    color: var(--ink);
    transition: transform 0.12s, box-shadow 0.2s;
  }
  .linkItem:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(34,38,47,0.1); }
  .linkItem .favicon {
    width: 30px; height: 30px;
    border-radius: 7px;
    flex-shrink: 0;
    background: var(--washi-deep);
    object-fit: contain;
  }
  .linkItem .linkText { flex: 1; min-width: 0; }
  .linkItem .linkName { font-size: 15px; font-weight: 700; word-break: break-word; }
  .linkItem .linkUrl {
    font-size: 12px; color: var(--ink-faint); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .linkItem .linkGo { color: var(--ink-faint); font-size: 18px; flex-shrink: 0; margin-right: 22px; }
  .linkDel {
    flex-shrink: 0;
    border: none;
    background: none;
    color: #c8c2b5;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .linkDel:hover { color: var(--shu); background: rgba(209,73,91,0.08); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  /* PC(広い画面)向け：横並びレイアウト */
  .sync-row { display: flex; justify-content: flex-end; margin-bottom: 4px; }
  @media (min-width: 980px) {
    body { padding: 44px 28px 60px; }
    .notebook { max-width: none; padding: 44px 44px 40px; }
    .viewTabs { display: none; }
    .panels {
      display: grid;
      grid-template-columns: minmax(380px, 440px) 1fr;
      gap: 34px;
      align-items: start;
    }
    .colRight { position: sticky; top: 24px; }
    .calCell { min-height: 118px; }
    #linkView { margin-top: 22px; border-top: 1px solid var(--line); padding-top: 20px; }
  }
</style>
</head>
<body>
<div class="notebook">

  <header>
    <h1><span class="eyebrow">Gyomu Daicho</span>おしごと帳</h1>
    <div id="loginArea">
      <button id="loginBtn">Googleでログイン</button>
    </div>
  </header>

  <div class="viewTabs">
    <button id="tabTaskBtn" class="active">📋 タスク一覧</button>
    <button id="tabCalBtn">📅 カレンダー</button>
    <button id="tabLinkBtn">🔗 リンク集</button>
  </div>

  <div class="panels">
    <div class="colLeft">

      <div class="add-card">
        <div class="row">
          <input type="text" id="titleInput" placeholder="タスク名(必須)">
        </div>
        <div class="row">
          <input type="date" id="dueInput">
          <select id="prioritySelect">
            <option value="高">優先度:高</option>
            <option value="中" selected>優先度:中</option>
            <option value="低">優先度:低</option>
          </select>
          <input type="text" id="categoryInput" placeholder="カテゴリ(任意)">
          <select id="recurSelect">
            <option value="none">繰り返しなし</option>
            <option value="daily">毎日</option>
            <option value="weekly">毎週</option>
            <option value="monthly">毎月</option>
          </select>
        </div>
        <button id="addBtn">追加</button>
      </div>

      <div class="row sync-row">
        <button id="syncBtn">🔄 カレンダーと同期</button>
      </div>
      <div class="status" id="status"></div>

      <div id="taskList"></div>

      <div id="linkView" style="display:none;">
        <div class="add-card">
          <div class="row">
            <input type="text" id="linkNameInput" placeholder="リンク名（例：出退勤システム）">
          </div>
          <div class="row">
            <input type="text" id="linkUrlInput" placeholder="URL（https://…）" style="flex:1 1 100%;">
          </div>
          <button id="addLinkBtn">リンクを追加</button>
        </div>
        <div id="linkList"></div>
      </div>

    </div>
    <div class="colRight">

      <div id="calendarView" style="display:none;">
        <div class="calNav">
          <button id="calPrevBtn">◀ 前月</button>
          <div class="calTitle" id="calTitle"></div>
          <button id="calNextBtn">次月 ▶</button>
        </div>
        <div class="calLegend">
          <span><span class="dot task"></span>台帳のタスク</span>
          <span><span class="dot event"></span>カレンダーの予定</span>
        </div>
        <div class="calExternalLinks">
          <a href="https://calendar.google.com/" target="_blank" rel="noopener">📅 Googleカレンダーを開く</a>
          <a href="https://mail.google.com/" target="_blank" rel="noopener">✉️ Gmailを開く</a>
          <span id="calQuickLinks" style="display:contents"></span>
        </div>
        <div class="calGrid" id="calGrid"></div>
        <div class="dayDetail" id="dayDetail" style="display:none;"></div>
      </div>

    </div>
  </div>

</div>

<script>
  // ==== 設定値 ====
  const SUPABASE_URL = "https://glxszbwsvembyygocekp.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_9grsvrOlzxrzJqsKvqF1ow_u8SFQsII";
  const GOOGLE_CLIENT_ID = "167635596955-2pvvv4rfsg55dq0ho4lkrkkm2gpjrvdi.apps.googleusercontent.com";
  const REDIRECT_URI = window.location.origin + window.location.pathname;
  const EDGE_FUNCTION_URL = SUPABASE_URL + "/functions/v1/google-auth";
  const SCOPE = "https://www.googleapis.com/auth/calendar";

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const statusEl = document.getElementById("status");
  const loginBtn = document.getElementById("loginBtn");
  const loginArea = document.getElementById("loginArea");
  const taskListEl = document.getElementById("taskList");

  function setStatus(msg) { statusEl.textContent = msg || ""; }

  /* ---------- Googleログイン部分 ---------- */

  function startGoogleLogin() {
    const params = new URLSearchParams({
      client_id: GOOGLE_CLIENT_ID,
      redirect_uri: REDIRECT_URI,
      response_type: "code",
      scope: SCOPE,
      access_type: "offline",
      prompt: "consent"
    });
    window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + params.toString();
  }

  loginBtn.addEventListener("click", startGoogleLogin);

  async function handleGoogleRedirect() {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get("code");
    if (!code) {
      await refreshLoginStatus();
      return;
    }
    loginBtn.disabled = true;
    loginBtn.textContent = "ログイン処理中…";
    try {
      const res = await fetch(EDGE_FUNCTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + SUPABASE_ANON_KEY,
          "apikey": SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ action: "exchange", code, redirect_uri: REDIRECT_URI })
      });
      const data = await res.json();
      if (data.error) {
        setStatus("ログインエラー:" + data.error);
      } else if (data.refresh_token) {
        await sb.from("app_settings")
          .update({ google_refresh_token: data.refresh_token, updated_at: new Date().toISOString() })
          .eq("id", 1);
      }
      window.history.replaceState({}, document.title, REDIRECT_URI);
    } catch (err) {
      setStatus("通信エラー:" + err.message);
    }
    await refreshLoginStatus();
  }

  async function refreshLoginStatus() {
    const { data } = await sb.from("app_settings").select("google_refresh_token").eq("id", 1).single();
    if (data && data.google_refresh_token) {
      loginArea.innerHTML = '<span class="ok">✓ カレンダー連携済み</span> <button id="reloginBtn" style="padding:6px 10px; font-size:12px; border:1px solid #4285F4; border-radius:8px; background:#fff; color:#4285F4; cursor:pointer;">🔄 再連携</button>';
      document.getElementById("reloginBtn").addEventListener("click", () => {
        if (confirm("Googleに再ログインして、すべてのカレンダーへのアクセスを取り直します。よろしいですか？")) {
          startGoogleLogin();
        }
      });
    } else {
      loginArea.innerHTML = '<button id="loginBtn2">Googleでログイン</button>';
      document.getElementById("loginBtn2").addEventListener("click", startGoogleLogin);
    }
  }

  /* ---------- Googleカレンダー連携部分 ---------- */

  // 有効なアクセストークンを取得(期限切れなら自動でリフレッシュ)
  async function getAccessToken() {
    const cached = localStorage.getItem("gt_access_token");
    const expiresAt = Number(localStorage.getItem("gt_expires_at") || 0);
    if (cached && Date.now() < expiresAt - 60000) {
      return cached;
    }

    const { data } = await sb.from("app_settings").select("google_refresh_token").eq("id", 1).single();
    if (!data || !data.google_refresh_token) return null;

    const res = await fetch(EDGE_FUNCTION_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "apikey": SUPABASE_ANON_KEY
      },
      body: JSON.stringify({ action: "refresh", refresh_token: data.google_refresh_token })
    });
    const tokenData = await res.json();
    if (tokenData.error) return null;

    localStorage.setItem("gt_access_token", tokenData.access_token);
    localStorage.setItem("gt_expires_at", Date.now() + tokenData.expires_in * 1000);
    return tokenData.access_token;
  }

  function ymd(d) {
    return d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0");
  }

  function addDays(dateStr, n) {
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + n);
    return ymd(d);
  }

  function nextDueDate(dateStr, recur) {
    const d = new Date(dateStr + "T00:00:00");
    if (recur === "daily") d.setDate(d.getDate() + 1);
    else if (recur === "weekly") d.setDate(d.getDate() + 7);
    else if (recur === "monthly") d.setMonth(d.getMonth() + 1);
    else return null;
    return ymd(d);
  }

  function recurRule(recur) {
    const map = { daily: "DAILY", weekly: "WEEKLY", monthly: "MONTHLY" };
    return map[recur] ? [`RRULE:FREQ=${map[recur]}`] : undefined;
  }

  // タスクからカレンダー予定を新規作成し、event_idを返す
  async function createCalendarEvent(task) {
    if (!task.due_date) return null;
    const token = await getAccessToken();
    if (!token) return null;

    const body = {
      summary: task.title,
      description: "業務台帳タスク(id:" + task.id + ")",
      start: { date: task.due_date },
      end: { date: addDays(task.due_date, 1) },
      recurrence: recurRule(task.recur)
    };

    const res = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events", {
      method: "POST",
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    return data.id || null;
  }

  async function deleteCalendarEvent(eventId) {
    if (!eventId) return;
    const token = await getAccessToken();
    if (!token) return;
    await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events/" + eventId, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token }
    });
  }

  // Googleカレンダー側で削除された予定を検知し、タスク側のリンクを解除する(タスクは残す)
  async function syncWithCalendar() {
    setStatus("カレンダーと同期中…");
    const token = await getAccessToken();
    if (!token) { setStatus("Googleに未ログインです"); return; }

    const { data: tasks } = await sb.from("tasks_ledger").select("id, google_event_id").not("google_event_id", "is", null);
    for (const t of tasks || []) {
      const res = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events/" + t.google_event_id, {
        headers: { "Authorization": "Bearer " + token }
      });
      if (res.status === 404 || res.status === 410) {
        await sb.from("tasks_ledger").update({ google_event_id: null }).eq("id", t.id);
      }
    }
    setStatus("同期完了しました");
    await loadTasks();
  }

  document.getElementById("syncBtn").addEventListener("click", syncWithCalendar);

  /* ---------- タスク管理部分 ---------- */

  async function loadTasks() {
    setStatus("読み込み中…");
    const { data, error } = await sb
      .from("tasks_ledger")
      .select("*")
      .order("done", { ascending: true })
      .order("due_date", { ascending: true, nullsFirst: false });

    if (error) {
      setStatus("読み込みエラー:" + error.message);
      return;
    }
    setStatus("");
    renderTasks(data);
  }

  function renderTasks(tasks) {
    if (!tasks || tasks.length === 0) {
      taskListEl.innerHTML = '<div class="empty">タスクはまだありません</div>';
      return;
    }
    taskListEl.innerHTML = tasks.map(t => taskHtml(t)).join("");

    tasks.forEach(t => {
      document.getElementById("check-" + t.id).addEventListener("change", () => toggleDone(t.id, !t.done));
      document.getElementById("del-" + t.id).addEventListener("click", () => deleteTask(t.id, t.title));
    });
  }

  function taskHtml(t) {
    const recurLabel = { none: "", daily: "🔁毎日", weekly: "🔁毎週", monthly: "🔁毎月" }[t.recur] || "";
    return `
      <div class="task p-${t.priority} ${t.done ? "done" : ""}">
        ${t.done ? '<div class="stamp">済</div>' : ""}
        <input type="checkbox" class="check" id="check-${t.id}" ${t.done ? "checked" : ""}>
        <div class="info">
          <div class="title ${t.done ? "done-text" : ""}">${escapeHtml(t.title)}</div>
          <div class="meta">
            ${t.due_date ? `<span class="tag">📅 ${t.due_date}</span>` : ""}
            <span class="tag">${t.priority}</span>
            ${t.category ? `<span class="tag">${escapeHtml(t.category)}</span>` : ""}
            ${recurLabel ? `<span class="tag">${recurLabel}</span>` : ""}
          </div>
        </div>
        <button class="delBtn" id="del-${t.id}">✕</button>
      </div>
    `;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  async function toggleDone(id, newDone) {
    const { data: task, error: getErr } = await sb.from("tasks_ledger").select("*").eq("id", id).single();
    if (getErr) { setStatus("更新エラー:" + getErr.message); return; }

    let newEventId = task.google_event_id;
    if (newDone) {
      // 完了にする:カレンダー予定を削除
      await deleteCalendarEvent(task.google_event_id);
      newEventId = null;
    } else if (task.due_date) {
      // 未完了に戻す:カレンダー予定を再作成
      newEventId = await createCalendarEvent(task);
    }

    const { error } = await sb.from("tasks_ledger")
      .update({ done: newDone, google_event_id: newEventId })
      .eq("id", id);
    if (error) { setStatus("更新エラー:" + error.message); return; }

    // 繰り返しタスクを完了にした場合、次回分を自動生成
    if (newDone && task.recur !== "none" && task.due_date) {
      const next = nextDueDate(task.due_date, task.recur);
      const { data: created } = await sb.from("tasks_ledger").insert({
        title: task.title,
        due_date: next,
        priority: task.priority,
        category: task.category,
        recur: task.recur,
        done: false
      }).select().single();

      if (created) {
        const eventId = await createCalendarEvent(created);
        if (eventId) {
          await sb.from("tasks_ledger").update({ google_event_id: eventId }).eq("id", created.id);
        }
      }
    }

    await loadTasks();
  }

  async function deleteTask(id, title) {
    if (!confirm(`「${title}」を削除します。よろしいですか？`)) return;
    const { data: task } = await sb.from("tasks_ledger").select("google_event_id").eq("id", id).single();
    if (task && task.google_event_id) await deleteCalendarEvent(task.google_event_id);

    const { error } = await sb.from("tasks_ledger").delete().eq("id", id);
    if (error) { setStatus("削除エラー:" + error.message); return; }
    await loadTasks();
  }

  document.getElementById("addBtn").addEventListener("click", async () => {
    const title = document.getElementById("titleInput").value.trim();
    if (!title) { setStatus("タスク名を入力してください"); return; }

    const due = document.getElementById("dueInput").value || null;
    const priority = document.getElementById("prioritySelect").value;
    const category = document.getElementById("categoryInput").value.trim() || null;
    const recur = document.getElementById("recurSelect").value;

    const { data: inserted, error } = await sb.from("tasks_ledger")
      .insert({ title, due_date: due, priority, category, recur })
      .select()
      .single();

    if (error) { setStatus("追加エラー:" + error.message); return; }

    if (inserted.due_date) {
      const eventId = await createCalendarEvent(inserted);
      if (eventId) {
        await sb.from("tasks_ledger").update({ google_event_id: eventId }).eq("id", inserted.id);
      }
    }

    document.getElementById("titleInput").value = "";
    document.getElementById("categoryInput").value = "";
    document.getElementById("dueInput").value = "";
    setStatus("");
    await loadTasks();
  });

  /* ---------- カレンダー表示部分 ---------- */

  const tabTaskBtn = document.getElementById("tabTaskBtn");
  const tabCalBtn = document.getElementById("tabCalBtn");
  const calendarViewEl = document.getElementById("calendarView");
  const calGridEl = document.getElementById("calGrid");
  const calTitleEl = document.getElementById("calTitle");
  const dayDetailEl = document.getElementById("dayDetail");

  const today = new Date();
  let calYear = today.getFullYear();
  let calMonth = today.getMonth(); // 0-11
  let monthEvents = {}; // { "YYYY-MM-DD": [event, ...] }
  let selectedDate = null;

  const tabLinkBtn = document.getElementById("tabLinkBtn");
  const linkViewEl = document.getElementById("linkView");

  const WIDE_BP = 980;
  const isWide = () => window.matchMedia("(min-width:" + WIDE_BP + "px)").matches;
  let narrowTab = "task";

  tabTaskBtn.addEventListener("click", () => switchView("task"));
  tabCalBtn.addEventListener("click", () => switchView("calendar"));
  tabLinkBtn.addEventListener("click", () => switchView("link"));

  function switchView(view) {
    narrowTab = view;
    if (isWide()) { applyLayout(); return; }
    renderNarrow();
  }

  // 狭い画面(iPadなど)：タブで一つずつ切り替え表示
  function renderNarrow() {
    [tabTaskBtn, tabCalBtn, tabLinkBtn].forEach(b => b.classList.remove("active"));
    taskListEl.style.display = "none";
    calendarViewEl.style.display = "none";
    linkViewEl.style.display = "none";
    if (narrowTab === "task") {
      tabTaskBtn.classList.add("active");
      taskListEl.style.display = "";
    } else if (narrowTab === "calendar") {
      tabCalBtn.classList.add("active");
      calendarViewEl.style.display = "";
      loadMonthEvents();
    } else if (narrowTab === "link") {
      tabLinkBtn.classList.add("active");
      linkViewEl.style.display = "";
      loadLinks();
    }
  }

  // 広い画面(PC)：タスク・リンク・カレンダーを同時に横並び表示
  function applyLayout() {
    if (isWide()) {
      taskListEl.style.display = "";
      linkViewEl.style.display = "";
      calendarViewEl.style.display = "";
      loadMonthEvents();
      loadLinks();
    } else {
      renderNarrow();
    }
  }

  let _wasWide = isWide();
  window.addEventListener("resize", () => {
    const w = isWide();
    if (w !== _wasWide) { _wasWide = w; applyLayout(); }
  });

  document.getElementById("calPrevBtn").addEventListener("click", () => {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    selectedDate = null;
    dayDetailEl.style.display = "none";
    loadMonthEvents();
  });
  document.getElementById("calNextBtn").addEventListener("click", () => {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    selectedDate = null;
    dayDetailEl.style.display = "none";
    loadMonthEvents();
  });

  // 指定した月のGoogleカレンダー予定を「全カレンダー分」取得して表示
  async function loadMonthEvents() {
    calTitleEl.textContent = `${calYear}年${calMonth + 1}月`;
    calGridEl.innerHTML = '<div class="empty" style="grid-column:1/-1;">読み込み中…</div>';

    const token = await getAccessToken();
    if (!token) {
      calGridEl.innerHTML = '<div class="empty" style="grid-column:1/-1;">Googleに未ログインです</div>';
      return;
    }

    const timeMin = new Date(calYear, calMonth, 1).toISOString();
    const timeMax = new Date(calYear, calMonth + 1, 1).toISOString();

    try {
      // 1. 利用中のカレンダー一覧を取得（非表示のものも含めて全部取得）
      const listRes = await fetch(
        "https://www.googleapis.com/calendar/v3/users/me/calendarList?showHidden=true&minAccessRole=reader",
        { headers: { "Authorization": "Bearer " + token } }
      );
      const listData = await listRes.json();
      const calendars = listData.items || [];

      // 2. 各カレンダーから当月の予定をまとめて取得
      monthEvents = {};
      for (const cal of calendars) {
        const params = new URLSearchParams({
          timeMin, timeMax,
          singleEvents: "true",
          orderBy: "startTime",
          maxResults: "250"
        });
        const res = await fetch(
          "https://www.googleapis.com/calendar/v3/calendars/" +
            encodeURIComponent(cal.id) + "/events?" + params.toString(),
          { headers: { "Authorization": "Bearer " + token } }
        );
        if (!res.ok) continue; // 権限がないカレンダーなどはスキップ
        const data = await res.json();

        (data.items || []).forEach(ev => {
          ev._calName = cal.summary || "";
          expandEventDates(ev).forEach(dateKey => {
            if (!monthEvents[dateKey]) monthEvents[dateKey] = [];
            monthEvents[dateKey].push(ev);
          });
        });
      }
    } catch (err) {
      calGridEl.innerHTML = '<div class="empty" style="grid-column:1/-1;">予定の取得に失敗しました</div>';
      return;
    }

    renderCalendar();
  }

  // 予定が複数日にまたがる場合、開始日から終了日まで各日のdateKeyを返す
  // 台帳のタスクから作られた予定かどうかを、descriptionの目印文字列で判定
  function isTaskEvent(ev) {
    return !!(ev.description && ev.description.includes("業務台帳タスク"));
  }

  function expandEventDates(ev) {
    let startKey, lastKey;

    if (ev.start.date) {
      startKey = ev.start.date;
      const endD = new Date(ev.end.date + "T00:00:00");
      endD.setDate(endD.getDate() - 1);
      lastKey = ymd(endD);
    } else if (ev.start.dateTime) {
      startKey = ev.start.dateTime.slice(0, 10);
      lastKey = (ev.end.dateTime || ev.start.dateTime).slice(0, 10);
    } else {
      return [];
    }

    const dates = [];
    let cur = new Date(startKey + "T00:00:00");
    const last = new Date(lastKey + "T00:00:00");
    let guard = 0;
    while (cur <= last && guard < 60) {
      dates.push(ymd(cur));
      cur.setDate(cur.getDate() + 1);
      guard++;
    }
    return dates;
  }

  function renderCalendar() {
    const dowLabels = ["日", "月", "火", "水", "木", "金", "土"];
    let html = dowLabels.map((d, i) => {
      const cls = i === 0 ? "calDow sun" : (i === 6 ? "calDow sat" : "calDow");
      return `<div class="${cls}">${d}</div>`;
    }).join("");

    const firstDow = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const todayKey = todayDateKey();

    for (let i = 0; i < firstDow; i++) {
      html += `<div class="calCell empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = `${calYear}-${String(calMonth + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      const evs = monthEvents[dateKey] || [];
      const isToday = dateKey === todayKey;
      const isSelected = dateKey === selectedDate;
      const shown = evs.slice(0, 3);
      const moreCount = evs.length - shown.length;

      html += `
        <div class="calCell ${isToday ? "today" : ""} ${isSelected ? "selected" : ""}" data-date="${dateKey}">
          <div class="dNum">${d}</div>
          ${shown.map(ev => `<div class="evChip ${isTaskEvent(ev) ? "task" : ""}">${escapeHtml(ev.summary || "(無題)")}</div>`).join("")}
          ${moreCount > 0 ? `<div class="evMore">他${moreCount}件</div>` : ""}
        </div>
      `;
    }

    calGridEl.innerHTML = html;
    calGridEl.querySelectorAll(".calCell[data-date]").forEach(cell => {
      cell.addEventListener("click", () => showDayDetail(cell.dataset.date));
    });
  }

  function todayDateKey() {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}-${String(t.getDate()).padStart(2, "0")}`;
  }

  function showDayDetail(dateKey) {
    selectedDate = dateKey;
    renderCalendar();

    const evs = monthEvents[dateKey] || [];
    const [y, m, d] = dateKey.split("-");
    dayDetailEl.style.display = "";

    if (evs.length === 0) {
      dayDetailEl.innerHTML = `<div class="dTitle">${m}月${d}日の予定</div><div class="evEmpty">予定はありません</div>`;
      return;
    }

    const rows = evs.map(ev => {
      let timeLabel = "終日";
      if (ev.start.dateTime) {
        const st = new Date(ev.start.dateTime);
        timeLabel = st.getHours().toString().padStart(2, "0") + ":" + st.getMinutes().toString().padStart(2, "0");
      }
      const calTag = ev._calName ? `<span class="evCal">${escapeHtml(ev._calName)}</span>` : "";
      return `<div class="evRow"><span class="dot ${isTaskEvent(ev) ? "task" : "event"}" style="margin-right:6px;"></span><span class="evTime">${timeLabel}</span>${escapeHtml(ev.summary || "(無題)")}${calTag}</div>`;
    }).join("");

    dayDetailEl.innerHTML = `<div class="dTitle">${m}月${d}日の予定</div>${rows}`;
  }

  /* ---------- リンク集部分 ---------- */

  const linkListEl = document.getElementById("linkList");
  const linkNameInput = document.getElementById("linkNameInput");
  const linkUrlInput = document.getElementById("linkUrlInput");

  document.getElementById("addLinkBtn").addEventListener("click", addLink);

  // カレンダー上部（Gmailの隣）にリンク集の中身を丸ボタンで並べる
  function renderQuickLinks(data) {
    const box = document.getElementById("calQuickLinks");
    if (!box) return;
    box.innerHTML = (data || []).map(link => {
      let host = "";
      try { host = new URL(link.url).hostname; } catch (e) {}
      const favicon = host
        ? `<img class="favicon" src="https://www.google.com/s2/favicons?domain=${host}&sz=64" alt="" style="width:16px;height:16px;border-radius:3px;">`
        : "🔗";
      return `<a href="${escapeHtml(link.url)}" target="_blank" rel="noopener">${favicon}${escapeHtml(link.name)}</a>`;
    }).join("");
  }

  async function loadLinks() {
    linkListEl.innerHTML = '<div class="empty">読み込み中…</div>';
    const { data, error } = await sb
      .from("bookmarks")
      .select("*")
      .order("created_at", { ascending: true });

    if (error) {
      linkListEl.innerHTML = '<div class="empty">リンクの読み込みに失敗しました</div>';
      return;
    }

    renderQuickLinks(data);

    if (!data || data.length === 0) {
      linkListEl.innerHTML = '<div class="empty">よく使う業務ページを追加しましょう</div>';
      return;
    }

    linkListEl.innerHTML = data.map(link => {
      // faviconはGoogleのサービスから取得（URLのドメインのアイコン）
      let host = "";
      try { host = new URL(link.url).hostname; } catch (e) {}
      const favicon = host
        ? `https://www.google.com/s2/favicons?domain=${host}&sz=64`
        : "";
      return `
        <div class="linkItem-wrap" style="position:relative;">
          <a class="linkItem" href="${escapeHtml(link.url)}" target="_blank" rel="noopener">
            ${favicon ? `<img class="favicon" src="${favicon}" alt="">` : '<span class="favicon"></span>'}
            <span class="linkText">
              <span class="linkName">${escapeHtml(link.name)}</span>
              <span class="linkUrl">${escapeHtml(link.url)}</span>
            </span>
            <span class="linkGo">↗</span>
          </a>
          <button class="linkDel" data-id="${link.id}" style="position:absolute; right:6px; top:50%; transform:translateY(-50%);">×</button>
        </div>`;
    }).join("");

    linkListEl.querySelectorAll(".linkDel").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        deleteLink(btn.dataset.id);
      });
    });
  }

  async function addLink() {
    const name = linkNameInput.value.trim();
    let url = linkUrlInput.value.trim();
    if (!name || !url) {
      alert("リンク名とURLの両方を入力してください");
      return;
    }
    // http/httpsが無ければ補う
    if (!/^https?:\/\//i.test(url)) {
      url = "https://" + url;
    }

    const { error } = await sb.from("bookmarks").insert({ name, url });
    if (error) {
      alert("追加に失敗しました");
      return;
    }
    linkNameInput.value = "";
    linkUrlInput.value = "";
    loadLinks();
  }

  async function deleteLink(id) {
    if (!confirm("このリンクを削除しますか？")) return;
    await sb.from("bookmarks").delete().eq("id", id);
    loadLinks();
  }

  // 期限の日付欄は枠のどこをクリックしてもカレンダーが開くようにする
  // （標準のアイコンだけだと小さくて押しにくいため）
  const dueInputEl = document.getElementById("dueInput");
  dueInputEl.addEventListener("click", () => {
    if (typeof dueInputEl.showPicker === "function") {
      try { dueInputEl.showPicker(); } catch (e) {}
    }
  });
  dueInputEl.style.cursor = "pointer";

  /* ---------- 初期化 ---------- */
  handleGoogleRedirect();
  loadTasks();
  applyLayout();
</script>
</body>
</html>
